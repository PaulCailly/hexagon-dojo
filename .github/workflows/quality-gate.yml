# registry/quality/quality-gate.yml
# Code-health gate. Scores your TypeScript source and posts a sticky "Code
# Quality" PR comment.  This gate is informational by design and never blocks:
# the health engine (index.mjs) always exits 0 regardless of score.  There is
# no block mode for quality.
#
# Dependency note: the health analyzer parses TypeScript via the `typescript`
# compiler API (analyze.mjs `import ts from 'typescript'`), so `typescript`
# must be resolvable from the repo root. The "Provide TypeScript" step below
# installs it defensively (safe whether or not your repo has a package.json /
# already depends on typescript). Edit the `src` scan path below to your
# source root (e.g. `packages/cli/src`) — this is a per-repo customization.
name: Quality gate
on:
  pull_request:
permissions:
  contents: read
  pull-requests: write
jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Provide TypeScript for the health analyzer
        run: npm i --no-save --no-audit --no-fund --legacy-peer-deps typescript@^5
      - name: Code-health metrics
        run: node scripts/health/index.mjs src --json .health/health.json | tee -a "$GITHUB_STEP_SUMMARY"
      - name: Install report deps
        working-directory: .github/sentinel
        run: npm ci --no-audit --no-fund
      - name: Code quality report
        working-directory: .github/sentinel
        run: npm run quality-report
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEALTH_REPORT_DIR: ${{ github.workspace }}/.health
          COVERAGE_SUMMARY: ${{ github.workspace }}/coverage/coverage-summary.json
